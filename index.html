  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <div style=\"position:absolute;top:-120px;right:-90px;width:320px;height:320px;border-radius:50%;background:oklch(0.64 0.19 45 / 0.16);\"><\u002Fdiv>\n    <div style=\"position:absolute;bottom:-140px;left:-100px;width:260px;height:260px;border-radius:50%;background:oklch(0.64 0.19 45 / 0.1);\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:640px;margin:0 auto;text-align:center;\">\n      <h1 style=\"font-family:Archivo,sans-serif;font-weight:800;font-size:clamp(30px,6vw,44px);line-height:1.08;color:oklch(0.99 0.005 90);margin:0 0 16px;letter-spacing:-0.01em;\">Driller bilen? Så er du landet det rette sted.<\u002Fh1>\n      <p style=\"font-size:clamp(16px,3vw,19px);line-height:1.6;color:oklch(0.85 0.015 65);margin:0 0 28px;\">Djurs Auto er det lokale bilværksted i Mesballe – lige mellem Ryomgård og Thorsager. Nick Møller har mere end 20 års erfaring og løser dit bilproblem hurtigt, venligt og til en af Djurslands bedste priser.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:12px;justify-content:center;\">\n        <a href=\"tel:+4581919201\" style=\"background:oklch(0.64 0.19 45);color:oklch(0.15 0.01 45);font-family:Archivo,sans-serif;font-weight:700;font-size:17px;padding:15px 26px;border-radius:10px;text-decoration:none;\">Ring 81 91 92 01<\u002Fa>\n        <a href=\"#aabningstider\" style=\"background:transparent;color:oklch(0.99 0.005 90);font-family:Archivo,sans-serif;font-weight:700;font-size:17px;padding:15px 26px;border-radius:10px;text-decoration:none;border:1.5px solid oklch(0.5 0.02 60);\">Se åbningstider<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px 22px;justify-content:center;margin-top:32px;font-size:13.5px;color:oklch(0.75 0.02 65);\">\n        <span>20+ års erfaring<\u002Fspan>\n        <span>·<\u002Fspan>\n        <span>Åbent man–fre 14–20<\u002Fspan>\n        <span>·<\u002Fspan>\n        <span>Astrupvej 2, Mesballe<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:720px;margin:0 auto;padding:44px 20px 8px;\">\n    <p style=\"font-size:clamp(16px,2.6vw,18.5px);line-height:1.7;color:oklch(0.32 0.02 60);text-align:center;margin:0;\">Du har travlt nok i forvejen. Bilen skal bare virke – uden at du selv skal bruge weekenden i graven eller betale en formue for det. Uanset om det er en rusten skærm, en bil der driller lige før syn, et dæk der er slidt ned, eller en større reparation du helst vil slippe for selv, så tager vi os af det hos Djurs Auto, mens du bruger tiden på noget bedre.<\u002Fp>\n  <\u002Fsection>\n\n  <section id=\"ydelser\" style=\"max-width:1080px;margin:0 auto;padding:48px 20px;\">\n    <div style=\"text-align:center;max-width:560px;margin:0 auto 32px;\">\n      <h2 style=\"font-family:Archivo,sans-serif;font-weight:800;font-size:clamp(24px,4vw,32px);margin:0 0 10px;color:oklch(0.2 0.02 60);\">Det klarer vi for dig<\u002Fh2>\n      <p style=\"font-size:16px;color:oklch(0.46 0.02 60);margin:0;\">Alt det du ikke selv har tid – eller lyst – til<\u002Fp>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{servicesCards}}\" hint-placeholder-val=\"{{true}}\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;\">\n        <div style=\"background:oklch(0.99 0.005 90);border:1px solid oklch(0.88 0.02 70);border-radius:14px;padding:22px;\">\n          <span style=\"display:inline-block;width:10px;height:10px;background:oklch(0.64 0.19 45);border-radius:2px;margin-bottom:12px;\"><\u002Fspan>\n          <h3 style=\"font-family:Archivo,sans-serif;font-weight:700;font-size:17.5px;margin:0 0 8px;color:oklch(0.2 0.02 60);\">Rustbehandling og rustreparation<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.55;color:oklch(0.42 0.02 60);margin:0;\">Rust breder sig, hvis det får lov. Vi udbedrer rustskader og standser dem, før de bliver et dyrere problem.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:oklch(0.99 0.005 90);border:1px solid oklch(0.88 0.02 70);border-radius:14px;padding:22px;\">\n          <span style=\"display:inline-block;width:10px;height:10px;background:oklch(0.64 0.19 45);border-radius:2px;margin-bottom:12px;\"><\u002Fspan>\n          <h3 style=\"font-family:Archivo,sans-serif;font-weight:700;font-size:17.5px;margin:0 0 8px;color:oklch(0.2 0.02 60);\">Klargøring til syn<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.55;color:oklch(0.42 0.02 60);margin:0;\">Vi gennemgår bilen, retter det der skal til, og gør den klar, så du kan møde til syn med ro i maven.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:oklch(0.99 0.005 90);border:1px solid oklch(0.88 0.02 70);border-radius:14px;padding:22px;\">\n          <span style=\"display:inline-block;width:10px;height:10px;background:oklch(0.64 0.19 45);border-radius:2px;margin-bottom:12px;\"><\u002Fspan>\n          <h3 style=\"font-family:Archivo,sans-serif;font-weight:700;font-size:17.5px;margin:0 0 8px;color:oklch(0.2 0.02 60);\">Dækskift og dækreparation<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.55;color:oklch(0.42 0.02 60);margin:0;\">Skift mellem sommer- og vinterdæk, reparation af punkteringer, og hjælp til at vælge de rigtige dæk til din bil og dit budget.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:oklch(0.99 0.005 90);border:1px solid oklch(0.88 0.02 70);border-radius:14px;padding:22px;\">\n          <span style=\"display:inline-block;width:10px;height:10px;background:oklch(0.64 0.19 45);border-radius:2px;margin-bottom:12px;\"><\u002Fspan>\n          <h3 style=\"font-family:Archivo,sans-serif;font-weight:700;font-size:17.5px;margin:0 0 8px;color:oklch(0.2 0.02 60);\">Motor, gearkasse og kobling<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.55;color:oklch(0.42 0.02 60);margin:0;\">Fra mindre motorfejl til udskiftning af motor, gearkasse eller kobling – vi tager de store reparationer, du ikke selv har værktøj, tid eller lyst til.<\u002Fp>\n        <\u00 -size:16px;line-height:1.65;color:oklch(0.34 0.02 60);margin:0 0 18px;\">Nick Møller har rodet med biler i mere end 20 år og ved præcis, hvor irriterende det er, når bilen driller på det værst tænkelige tidspunkt. I maj 2026 åbnede han Djurs Auto i Mesballe med ét mål for øje: at reparere biler hurtigt, ærligt og til priser, der ikke gør ondt på pengepungen.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.65;color:oklch(0.34 0.02 60);margin:0 0 20px;\">Her får du et lige-ud-ad-landevejen svar på, hvad der er galt, hvad det koster, og hvornår du kan hente bilen igen – uden fagsprog og uden overraskelser på regningen.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;\">\n          <span style=\"font-size:13px;font-weight:600;color:oklch(0.4 0.15 45);background:oklch(0.93 0.05 55);padding:6px 12px;border-radius:999px;\">20+ års erfaring<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:oklch(0.4 0.15 45);background:oklch(0.93 0.05 55);padding:6px 12px;border-radius:999px;\">Ærlig rådgivning<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:oklch(0.4 0.15 45);background:oklch(0.93 0.05 55);padding:6px 12px;border-radius:999px;\">Alle bilmærker<\u002Fspan>\n          <span style=\"font-size:13px;font-weight:600;color:oklch(0.4 0.15 45);background:oklch(0.93 0.05 55);padding:6px 12px;border-radius:999px;\">En af Djurslands bedste priser<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:680px;margin:0 auto;padding:48px 20px;text-align:center;\">\n    <h2 style=\"font-family:Archivo,sans-serif;font-weight:800;font-size:clamp(22px,3.6vw,28px);margin:0 0 14px;color:oklch(0.2 0.02 60);\">Priser du kan regne med<\u002Fh2>\n    <p style=\"font-size:16px;line-height:1.65;color:oklch(0.34 0.02 60);margin:0 0 22px;\">Ingen skjulte gebyrer og ingen overraskelser, når regningen lander. Du får en ærlig vurdering og en fair pris, før arbejdet
